env:
  headless: true
  state_dim: 11              # 충돌방향/속도/벨트(3) + 체형(2) + 자세·거리(6)
  episode_steps: 60          # RL action 주기 횟수 (control_dt 기준)
  physics_dt: 0.001          # 물리 연산 주기 1ms — HIC15 슬라이딩 윈도우 정밀도
  control_dt: 0.016667       # RL action/observation 주기 1/60초

ppo:
  lr: 3.0e-4
  gamma: 0.99
  lam: 0.95          # GAE λ
  clip: 0.2
  epochs: 10
  entropy_coeff: 0.01
  batch_size: 256

train:
  total_episodes: 10000
  save_interval: 500
  log_interval: 50

scenario:
  angle_range: [0, 360]
  speed_range: [20, 120]   # km/h
  stiffness: ["concrete", "vehicle", "wood"]

airbag:
  timing_max_ms: 30.0
  pressure_max_kpa: 600.0
  pressure_opt_kpa: 300.0
  damping_max: 0.75
